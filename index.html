<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест: Здоровый день. Здоровая жизнь</title>
    <style>
        :root {
            --bg: #f3faf7;
            --card-bg: rgba(255, 255, 255, 0.75);
            --primary: #1a7f5a;
            --primary-light: #2ecc71;
            --accent: #0d6b4e;
            --text: #1a2e2a;
            --text-light: #3d5a52;
            --danger: #e74c3c;
            --danger-bg: #fef0ef;
            --success: #27ae60;
            --success-bg: #eafaf1;
            --border: #d0e8dc;
            --shadow-sm: 0 2px 8px rgba(26, 127, 90, 0.06);
            --shadow-md: 0 12px 32px rgba(26, 127, 90, 0.1);
            --shadow-lg: 0 24px 48px rgba(13, 107, 78, 0.15);
            --radius-sm: 14px;
            --radius-md: 20px;
            --radius-lg: 32px;
            --transition: 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: linear-gradient(160deg, #e8f5ee 0%, #d4efe1 25%, #eaf6f0 50%, #dceee4 75%, #e2f3ea 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
            position: relative;
            overflow-x: hidden;
        }

        /* Декоративные фоновые элементы */
        body::before {
            content: '';
            position: fixed;
            top: -15%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(46, 204, 113, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: floatBubble1 12s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -12%;
            left: -8%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(26, 127, 90, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: floatBubble2 14s ease-in-out infinite;
        }

        @keyframes floatBubble1 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(-30px, 25px) scale(1.05);
            }
            66% {
                transform: translate(20px, -15px) scale(0.97);
            }
        }
        @keyframes floatBubble2 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(25px, -20px) scale(1.04);
            }
            66% {
                transform: translate(-15px, 18px) scale(0.96);
            }
        }

        #app {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 720px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255, 255, 255, 0.6) inset;
            padding: 0;
            overflow: hidden;
            transition: all var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* ---- Шапка с заголовком ---- */
        .app-header {
            background: linear-gradient(135deg, #1a7f5a 0%, #14805a 30%, #0e6b4a 60%, #0b5c3e 100%);
            padding: 28px 35px 22px;
            text-align: center;
            position: relative;
            overflow: hidden;
            color: #fff;
        }
        .app-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -20%;
            width: 250px;
            height: 250px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50%;
            pointer-events: none;
        }
        .app-header::after {
            content: '';
            position: absolute;
            bottom: -40%;
            right: -15%;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            pointer-events: none;
        }
        .app-header .header-icon {
            font-size: 2.8rem;
            display: block;
            margin-bottom: 4px;
            position: relative;
            z-index: 1;
            animation: gentleBounce 2s ease-in-out infinite;
        }
        @keyframes gentleBounce {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }
        .app-header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            position: relative;
            z-index: 1;
            margin: 0;
            line-height: 1.3;
        }
        .app-header .subtitle {
            font-size: 0.9rem;
            font-weight: 400;
            opacity: 0.85;
            position: relative;
            z-index: 1;
            margin-top: 4px;
            letter-spacing: 0.2px;
        }

        /* Основное содержимое */
        .app-body {
            padding: 28px 35px 36px;
        }

        @media (max-width: 500px) {
            .app-header {
                padding: 22px 18px 18px;
            }
            .app-header h1 {
                font-size: 1.35rem;
            }
            .app-header .header-icon {
                font-size: 2.2rem;
            }
            .app-body {
                padding: 18px 16px 24px;
            }
            #app {
                border-radius: 24px;
            }
        }

        /* Прогресс-бар */
        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 26px;
        }
        .progress-bar {
            flex: 1;
            height: 8px;
            background: #dcebe3;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.06);
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #27ae60, #2ecc71, #3ddc84);
            border-radius: 20px;
            transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.4);
        }
        .question-counter {
            font-size: 0.85rem;
            font-weight: 700;
            color: #1a7f5a;
            background: rgba(26, 127, 90, 0.1);
            padding: 5px 16px;
            border-radius: 30px;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        /* Карточка вопроса */
        .question-card {
            position: relative;
            min-height: 280px;
        }
        .question-text {
            font-size: 1.4rem;
            font-weight: 650;
            color: var(--text);
            line-height: 1.5;
            margin-bottom: 24px;
            padding-bottom: 14px;
            border-bottom: 2px dashed rgba(26, 127, 90, 0.15);
            letter-spacing: -0.2px;
        }
        @media (max-width: 500px) {
            .question-text {
                font-size: 1.15rem;
            }
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 11px;
        }
        .option {
            background: #fff;
            border: 2px solid #e2efe8;
            border-radius: var(--radius-md);
            padding: 15px 20px;
            font-size: 1rem;
            color: var(--text);
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            overflow: hidden;
        }
        .option::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.04) 0%, transparent 60%);
            opacity: 0;
            transition: opacity var(--transition);
            pointer-events: none;
        }
        .option:hover:not(.disabled) {
            border-color: #5ecf94;
            background: #fafffc;
            transform: translateY(-3px);
            box-shadow: 0 10px 24px rgba(26, 127, 90, 0.1);
        }
        .option:hover:not(.disabled)::after {
            opacity: 1;
        }
        .option .letter {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #e8f5ee;
            color: #1a7f5a;
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0;
            transition: 0.25s;
            letter-spacing: 0;
        }
        .option:hover:not(.disabled) .letter {
            background: #c8e9d6;
            transform: scale(1.06);
        }
        .option.correct {
            border-color: #27ae60 !important;
            background: #eafaf1 !important;
            box-shadow: 0 0 0 4px rgba(39, 174, 96, 0.1);
        }
        .option.correct .letter {
            background: #27ae60;
            color: #fff;
        }
        .option.wrong {
            border-color: #e74c3c !important;
            background: #fef0ef !important;
            box-shadow: 0 0 0 4px rgba(231, 76, 60, 0.08);
            animation: shake 0.4s ease;
        }
        .option.wrong .letter {
            background: #e74c3c;
            color: #fff;
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-5px);
            }
            40% {
                transform: translateX(5px);
            }
            60% {
                transform: translateX(-4px);
            }
            80% {
                transform: translateX(3px);
            }
        }
        .option.disabled {
            cursor: default;
            pointer-events: none;
            opacity: 0.75;
        }
        .option.selected {
            border-width: 2.5px;
            font-weight: 500;
        }
        .option.reveal-correct {
            border-color: #27ae60 !important;
            background: #eafaf1 !important;
            box-shadow: 0 0 0 4px rgba(39, 174, 96, 0.1);
        }

        /* Анимация карточки */
        .fade-enter {
            animation: fadeSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .fade-exit {
            animation: fadeSlideOut 0.35s cubic-bezier(0.55, 0, 0.8, 0.2) forwards;
        }
        @keyframes fadeSlideIn {
            0% {
                opacity: 0;
                transform: translateY(28px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes fadeSlideOut {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
        }

        /* Результат */
        #result {
            animation: resultAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes resultAppear {
            0% {
                opacity: 0;
                transform: scale(0.94) translateY(24px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .result-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .result-header .result-emoji {
            font-size: 3rem;
            display: block;
            margin-bottom: 4px;
        }
        .result-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .result-header .score {
            font-size: 3.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1a7f5a, #2ecc71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }
        .result-stats {
            display: flex;
            justify-content: center;
            gap: 44px;
            margin: 16px 0 28px;
        }
        .stat-item {
            text-align: center;
            background: #fff;
            border-radius: 18px;
            padding: 16px 22px;
            box-shadow: var(--shadow-sm);
            min-width: 90px;
        }
        .stat-item .number {
            font-size: 2.4rem;
            font-weight: 700;
            line-height: 1;
        }
        .stat-item .label {
            font-size: 0.85rem;
            color: #5a7a6e;
            margin-top: 4px;
            font-weight: 500;
        }
        .stat-item.correct .number {
            color: #27ae60;
        }
        .stat-item.wrong .number {
            color: #e74c3c;
        }
        .detail-list {
            margin-top: 20px;
            border-top: 2px solid #e2efe8;
            padding-top: 16px;
            max-height: 360px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .detail-list::-webkit-scrollbar {
            width: 5px;
        }
        .detail-list::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 10px;
        }
        .detail-list::-webkit-scrollbar-thumb {
            background: #c8e0d4;
            border-radius: 10px;
        }
        .detail-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px 0;
            border-bottom: 1px solid #ecf6f1;
            font-size: 0.9rem;
            flex-wrap: wrap;
        }
        .detail-item .q-num {
            font-weight: 700;
            color: #1a7f5a;
            min-width: 28px;
        }
        .detail-item .q-text {
            flex: 1;
            color: #1a2e2a;
            min-width: 180px;
            line-height: 1.4;
        }
        .detail-item .icon {
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .detail-item .user-ans,
        .detail-item .correct-ans {
            font-weight: 600;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        .detail-item .user-ans.wrong-ans {
            background: #fef0ef;
            color: #c0392b;
        }
        .detail-item .user-ans.correct-ans {
            background: #eafaf1;
            color: #1e8449;
        }
        .detail-item .correct-ans {
            background: #e8f5ee;
            color: #1a7f5a;
        }
        .btn-restart {
            display: inline-block;
            margin-top: 28px;
            padding: 15px 44px;
            background: linear-gradient(135deg, #1a7f5a, #27ae60);
            color: #fff;
            border: none;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 8px 22px rgba(26, 127, 90, 0.3);
            letter-spacing: 0.3px;
            width: 100%;
            text-align: center;
        }
        .btn-restart:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 32px rgba(26, 127, 90, 0.4);
            background: linear-gradient(135deg, #14805a, #2ecc71);
        }
        .btn-restart:active {
            transform: scale(0.96);
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Заголовок -->
        <div class="app-header">
            <span class="header-icon">🌿</span>
            <h1>Здоровый день. Здоровая жизнь</h1>
            <p class="subtitle">Проверьте свои знания о здоровом образе жизни</p>
        </div>

        <div class="app-body">
            <!-- Прогресс -->
            <div class="progress-wrap" id="progressWrap">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="question-counter" id="questionCounter">1 / 10</span>
            </div>

            <!-- Контейнер вопроса -->
            <div id="questionContainer" class="question-card fade-enter">
                <div id="questionText" class="question-text"></div>
                <div id="optionsContainer" class="options"></div>
            </div>

            <!-- Блок результата (изначально скрыт) -->
            <div id="result" class="hidden">
                <div class="result-header">
                    <span class="result-emoji" id="resultEmoji">🏆</span>
                    <h2>Ваш результат</h2>
                    <div class="score" id="scoreDisplay">0 / 10</div>
                </div>
                <div class="result-stats">
                    <div class="stat-item correct">
                        <div class="number" id="correctCount">0</div>
                        <div class="label">✅ Правильно</div>
                    </div>
                    <div class="stat-item wrong">
                        <div class="number" id="wrongCount">0</div>
                        <div class="label">❌ Неправильно</div>
                    </div>
                </div>
                <div class="detail-list" id="detailList"></div>
                <button class="btn-restart" id="restartBtn">🔄 Пройти заново</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- Данные теста ----------
            const questions = [{
                    question: 'Какое определение здоровья даёт Всемирная организация здравоохранения (ВОЗ)?',
                    options: [
                        'Отсутствие физических дефектов',
                        'Состояние полного физического, душевного и социального благополучия',
                        'Способность выполнять физическую работу без усталости',
                        'Отсутствие болезней и регулярные медицинские осмотры'
                    ],
                    correct: 1
                }, {
                    question: 'Что из перечисленного НЕ является элементом здорового образа жизни, согласно презентации?',
                    options: [
                        'Профилактика болезней',
                        'Укрепление здоровья',
                        'Регулярное употребление энергетических напитков',
                        'Принципы здорового питания'
                    ],
                    correct: 2
                }, {
                    question: 'Какая максимальная температура нагрева табака в системе нагревания табака (указано в презентации)?',
                    options: [
                        '100°C',
                        '200°C',
                        '350°C',
                        '500°C'
                    ],
                    correct: 2
                }, {
                    question: 'Какие канцерогены выделяются при курении системы нагревания табака?',
                    options: [
                        'Только никотин и вода',
                        'Монооксид углерода, летучие органические вещества и полициклические ароматические углеводороды',
                        'Только формальдегид и бензол',
                        'Углекислый газ и азот'
                    ],
                    correct: 1
                }, {
                    question: 'Какое токсичное вещество упоминается в составе дыма кальяна?',
                    options: [
                        'Нитрозамины',
                        'Кофеин',
                        'Витамин С',
                        'Антиоксиданты'
                    ],
                    correct: 0
                }, {
                    question: 'Какое из перечисленных последствий НЕ относится к последствиям недостатка сна (согласно презентации)?',
                    options: [
                        'Ухудшение ежедневного самочувствия',
                        'Влияние на здоровье в целом',
                        'Улучшение памяти и концентрации',
                        'Влияние на психоэмоциональное состояние'
                    ],
                    correct: 2
                }, {
                    question: 'Как часто должны проходить диспансеризацию люди в возрасте от 40 лет и старше?',
                    options: [
                        'Один раз в три года',
                        'Один раз в год',
                        'Один раз в пять лет',
                        'Только при наличии симптомов'
                    ],
                    correct: 1
                }, {
                    question: 'Какой фактор риска сердечно-сосудистых заболеваний относится к неизменяемым (по классификации из презентации)?',
                    options: [
                        'Повышение уровня холестерина',
                        'Курение',
                        'Низкая физическая активность',
                        'Возраст'
                    ],
                    correct: 3
                }, {
                    question: 'Согласно рекомендациям по профилактике онкологических заболеваний, что необходимо исключить?',
                    options: [
                        'Употребление фруктов',
                        'Курение или жевание табака',
                        'Занятия спортом',
                        'Режим сна'
                    ],
                    correct: 1
                }, {
                    question: 'Какое расстояние от глаз до книги рекомендуется соблюдать при чтении?',
                    options: [
                        'Не ближе 10 см и не дальше 20 см',
                        'Не ближе 30 см и не дальше 40 см',
                        'Не ближе 50 см и не дальше 60 см',
                        'Не ближе 70 см и не дальше 80 см'
                    ],
                    correct: 1
                }
            ];

            const LETTERS = ['А', 'Б', 'В', 'Г'];
            const TOTAL = questions.length;
            let currentIndex = 0;
            let userAnswers = new Array(TOTAL).fill(null);
            let isAnswering = false;

            const questionContainer = document.getElementById('questionContainer');
            const questionText = document.getElementById('questionText');
            const optionsContainer = document.getElementById('optionsContainer');
            const progressFill = document.getElementById('progressFill');
            const questionCounter = document.getElementById('questionCounter');
            const resultBlock = document.getElementById('result');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const correctCountSpan = document.getElementById('correctCount');
            const wrongCountSpan = document.getElementById('wrongCount');
            const detailList = document.getElementById('detailList');
            const restartBtn = document.getElementById('restartBtn');
            const resultEmoji = document.getElementById('resultEmoji');

            function renderQuestion(index) {
                const q = questions[index];
                questionText.textContent = q.question;
                optionsContainer.innerHTML = '';
                q.options.forEach((opt, i) => {
                    const div = document.createElement('div');
                    div.className = 'option';
                    div.dataset.index = i;
                    div.innerHTML = `<span class="letter">${LETTERS[i]}</span> ${opt}`;
                    div.addEventListener('click', () => handleOptionClick(index, i));
                    optionsContainer.appendChild(div);
                });
                const progress = ((index + 1) / TOTAL) * 100;
                progressFill.style.width = progress + '%';
                questionCounter.textContent = `${index + 1} / ${TOTAL}`;
                questionContainer.classList.remove('fade-exit');
                questionContainer.classList.remove('fade-enter');
                void questionContainer.offsetWidth;
                questionContainer.classList.add('fade-enter');
            }

            function handleOptionClick(qIndex, optionIndex) {
                if (isAnswering) return;
                if (userAnswers[qIndex] !== null) return;
                isAnswering = true;
                const q = questions[qIndex];
                const isCorrect = (optionIndex === q.correct);
                userAnswers[qIndex] = optionIndex;
                const allOptions = optionsContainer.querySelectorAll('.option');
                allOptions.forEach((el, idx) => {
                    el.classList.add('disabled');
                    if (idx === optionIndex) {
                        el.classList.add('selected');
                        el.classList.add(isCorrect ? 'correct' : 'wrong');
                    }
                    if (idx === q.correct && !isCorrect) {
                        el.classList.add('reveal-correct', 'correct');
                    }
                });
                setTimeout(() => {
                    if (qIndex < TOTAL - 1) {
                        questionContainer.classList.remove('fade-enter');
                        questionContainer.classList.add('fade-exit');
                        setTimeout(() => {
                            currentIndex = qIndex + 1;
                            renderQuestion(currentIndex);
                            isAnswering = false;
                        }, 350);
                    } else {
                        questionContainer.classList.remove('fade-enter');
                        questionContainer.classList.add('fade-exit');
                        setTimeout(() => {
                            showResult();
                            isAnswering = false;
                        }, 350);
                    }
                }, 1000);
            }

            function showResult() {
                questionContainer.classList.add('hidden');
                resultBlock.classList.remove('hidden');
                document.getElementById('progressWrap').style.opacity = '0.4';
                let correct = 0;
                let wrong = 0;
                let detailsHTML = '';
                questions.forEach((q, idx) => {
                    const userAns = userAnswers[idx];
                    const isCorrect = (userAns === q.correct);
                    if (isCorrect) correct++;
                    else wrong++;
                    const userText = (userAns !== null) ? q.options[userAns] : '—';
                    const correctText = q.options[q.correct];
                    const icon = isCorrect ? '✅' : '❌';
                    const userClass = isCorrect ? 'correct-ans' : 'wrong-ans';
                    detailsHTML += `
                <div class="detail-item">
                  <span class="q-num">${idx+1}.</span>
                  <span class="q-text">${q.question}</span>
                  <span class="icon">${icon}</span>
                  <span class="user-ans ${userClass}">${userText}</span>
                  <span class="correct-ans">${correctText}</span>
                </div>
              `;
                });
                scoreDisplay.textContent = `${correct} / ${TOTAL}`;
                correctCountSpan.textContent = correct;
                wrongCountSpan.textContent = wrong;
                detailList.innerHTML = detailsHTML;
                // Эмодзи в зависимости от результата
                const ratio = correct / TOTAL;
                if (ratio >= 0.9) resultEmoji.textContent = '🏆';
                else if (ratio >= 0.7) resultEmoji.textContent = '🌟';
                else if (ratio >= 0.5) resultEmoji.textContent = '👍';
                else resultEmoji.textContent = '📚';
            }

            function restart() {
                currentIndex = 0;
                userAnswers = new Array(TOTAL).fill(null);
                isAnswering = false;
                resultBlock.classList.add('hidden');
                questionContainer.classList.remove('hidden');
                document.getElementById('progressWrap').style.opacity = '1';
                questionContainer.classList.remove('fade-exit', 'fade-enter');
                void questionContainer.offsetWidth;
                renderQuestion(0);
            }

            function init() {
                renderQuestion(0);
                restartBtn.addEventListener('click', restart);
            }
            init();
        })();
    </script>
</body>
</html>
